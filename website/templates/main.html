<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laptop Price Predictor</title>
    <link rel="stylesheet" href="../static/styles.css">
</head>
<body>
    <div class="container">
        <h1>Laptop Price Predictor</h1>

        <form class="predict-form">
            <!-- RAM -->
            <div class="form-group">
                <label for="ram">RAM (GB)</label>
                <input type="number" id="ram" name="ram" placeholder="8">
            </div>

            <!-- Weight -->
            <div class="form-group">
                <label for="weight">Weight (kg)</label>
                <input type="number" id="weight" name="weight" placeholder="1.3" step="0.1">
            </div>

            <!-- Touchscreen -->
            <div class="form-group">
                <label>Touchscreen</label>
                <div class="radio-group">
                    <input type="radio" id="touch-yes" name="touchscreen" value="yes">
                    <label for="touch-yes">Yes</label>
                    <input type="radio" id="touch-no" name="touchscreen" value="no">
                    <label for="touch-no">No</label>
                </div>
            </div>

            <!-- IPS -->
            <div class="form-group">
                <label>IPS</label>
                <div class="radio-group">
                    <input type="radio" id="ips-yes" name="ips" value="yes">
                    <label for="ips-yes">Yes</label>
                    <input type="radio" id="ips-no" name="ips" value="no">
                    <label for="ips-no">No</label>
                </div>
            </div>

            <!-- Company -->
            <div class="form-group">
                <label for="company">Company</label>
                <select id="company" name="company">
                    <option value="Acer">Acer</option>
                    <option value="Apple">Apple</option>
                    <option value="Dell">Dell</option>
                    <option value="HP">HP</option>
                    <option value="Lenovo">Lenovo</option>
                    <option value="MSI">MSI</option>
                    <option value="Toshiba">Toshiba</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <!-- Type -->
            <div class="form-group">
                <label for="type">Type Name</label>
                <select id="type" name="type">
                    <option value="2 in 1 Convertible">2 in 1 Convertible</option>
                    <option value="Gaming">Gaming</option>
                    <option value="Netbook">Netbook</option>
                    <option value="Notebook">Notebook</option>
                    <option value="Ultrabook">Ultrabook</option>
                    <option value="Workstation">Workstation</option>
                </select>
            </div>

            <!-- CPU -->
            <div class="form-group">
                <label for="cpu">CPU Name</label>
                <select id="cpu" name="cpu">
                    <option value="AMD">AMD</option>
                    <option value="Other">Other</option>
                    <option value="intel core i3">Intel Core i3</option>
                    <option value="intel core i5">Intel Core i5</option>
                    <option value="intel core i7">Intel Core i7</option>
                </select>
            </div>

            <!-- GPU -->
            <div class="form-group">
                <label for="gpu">GPU Name</label>
                <select id="gpu" name="gpu">
                    <option value="AMD">AMD</option>
                    <option value="Intel">Intel</option>
                    <option value="Nvidia">Nvidia</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <!-- OS -->
            <div class="form-group">
                <label for="os">Operating System</label>
                <select id="os" name="os">
                    <option value="Linux">Linux</option>
                    <option value="Mac">Mac</option>
                    <option value="Windows">Windows</option>
                </select>
            </div>

            <button type="submit" class="submit-btn" method = 'POST'>Predict Price</button>
        </form>
    </div>
</body>
</html>
